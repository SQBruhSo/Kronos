<!DOCTYPE html>
<html lang="es" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Productivity OS</title>
    
    <!-- White Flash Protection -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'system';
            let actualTheme = savedTheme;
            if (savedTheme === 'system') {
                actualTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', actualTheme);
            
            const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = isMobile ? 'manifest.json' : 'manifest-pc.json';
            document.head.appendChild(manifestLink);
        })();
    </script>

    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-color: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: rgba(0, 0, 0, 0.1);
            --accent-color: #0071e3;
            --accent-bg: rgba(0, 113, 227, 0.1);
            --danger-color: #ff3b30;
            --safe-blur: blur(20px);
            
            --aura-bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --drawer-bezier: cubic-bezier(0.32, 0.94, 0.6, 1);
            
            --color-red: #ff3b30;
            --color-green: #34c759;
            --color-yellow: #ffcc00;
            --color-blue: #0071e3;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --text-color: #f5f5f7;
            --text-secondary: #86868b;
            --border-color: rgba(255, 255, 255, 0.15);
            --accent-color: #2997ff;
            --accent-bg: rgba(41, 151, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.5s var(--aura-bezier);
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Glassmorphism General */
        .glass {
            background: var(--card-bg);
            backdrop-filter: var(--safe-blur);
            -webkit-backdrop-filter: var(--safe-blur);
            border: 1px solid var(--border-color);
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 500px;
            height: 64px;
            border-radius: 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--aura-bezier);
        }

        .nav-item.active {
            color: var(--accent-color);
            background: var(--accent-bg);
            transform: scale(1.1);
        }

        /* Views Layout */
        .view {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 24px;
            animation: fadeIn 0.4s var(--aura-bezier) forwards;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography & Structure */
        h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }

        .editable-title {
            outline: none;
            border-bottom: 2px solid transparent;
            transition: border-0.3s;
            display: inline-block;
        }
        .editable-title:focus { border-bottom-color: var(--accent-color); }

        /* Grid Home Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .dash-card {
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .dash-card .count { font-size: 32px; font-weight: 700; color: var(--accent-color); }

        /* Day Schedule / Cronograma */
        .schedule-box {
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        .schedule-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .schedule-item:last-child { border: none; }
        .schedule-time { font-weight: 600; color: var(--accent-color); font-size: 14px; }

        /* Calendar Matrix */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .calendar-nav-btn {
            background: var(--accent-bg);
            border: none;
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }
        .weekday-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); padding-bottom: 8px; }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            position: relative;
            transition: background 0.2s;
        }
        .calendar-day:hover { background: var(--border-color); }
        .calendar-day.today { background: var(--accent-color) !important; color: white; }
        .day-dots {
            display: flex;
            gap: 2px;
            position: absolute;
            bottom: 4px;
        }
        .dot { width: 4px; height: 4px; border-radius: 50%; }

        /* Inputs & Buttons Unified */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="time"], select {
            flex: 1;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }
        .btn-action {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Task & Note Nodes */
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 10px;
            transition: opacity 0.3s, transform 0.3s;
        }
        .item-row.completed { opacity: 0.5; }
        .item-row.completed .item-text { text-decoration: line-through; }
        
        .item-left { display: flex; align-items: center; gap: 12px; }
        .checkbox-custom {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .checkbox-custom.checked {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }
        .checkbox-custom.checked::after {
            content: "✓";
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        /* Color Matrix tags */
        .color-picker { display: flex; gap: 8px; margin: 10px 0; }
        .color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-opt.selected { border-color: var(--text-color); transform: scale(1.1); }

        /* Bottom Drawers and Modals */
        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 85vh;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s var(--drawer-bezier);
            z-index: 1100;
            padding: 24px;
            overflow-y: auto;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.15);
        }
        .drawer.open { transform: translateY(0); }
        
        .overlay {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1050;
            backdrop-filter: blur(4px);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        /* Rich Text Editor Modal */
        .editor-toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .editor-btn {
            background: var(--border-color);
            border: none;
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .rich-box {
            min-height: 200px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px;
            outline: none;
            background: rgba(0,0,0,0.02);
        }

        /* Update Log Layout (upd.txt parser) */
        .changelog-box {
            margin-top: 16px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(0,0,0,0.02);
            max-height: 250px;
            overflow-y: auto;
        }
        .log-version {
            font-weight: 700;
            color: var(--accent-color);
            margin-top: 10px;
            font-size: 15px;
        }
        .log-item {
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: 8px;
            margin-top: 4px;
            line-height: 1.4;
        }

        /* Quick Utility Trigger classes */
        .flex-row-center { display: flex; justify-content: space-between; align-items: center; }
        .header-actions { display: flex; gap: 10px; }
        .mini-btn { background: none; border: none; color: var(--text-color); font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Overlay Global para Modales -->
    <div class="overlay" id="global-overlay"></div>

    <!-- MAIN APP WRAPPER -->
    <main>
        
        <!-- VISTA: HOME -->
        <section id="view-home" class="view active">
            <div class="flex-row-center" style="margin-bottom: 20px;">
                <h1>Hi, <span class="editable-title" contenteditable="true" id="user-profile-name">User</span></h1>
                <div class="header-actions">
                    <button class="mini-btn" id="btn-trigger-manual">📖</button>
                    <button class="mini-btn" id="btn-trigger-settings">⚙️</button>
                </div>
            </div>
            
            <div class="dashboard-grid">
                <div class="dash-card glass">
                    <span class="count" id="count-events">0</span>
                    <span data-i18n="dash_events">Eventos Mes</span>
                </div>
                <div class="dash-card glass">
                    <span class="count" id="count-tasks">0</span>
                    <span data-i18n="dash_tasks">Pendientes</span>
                </div>
            </div>

            <div class="schedule-box glass">
                <h2 data-i18n="day_schedule">Cronograma del Día</h2>
                <div id="day-schedule-render"></div>
            </div>
        </section>

        <!-- VISTA: CALENDARIO -->
        <section id="view-calendar" class="view">
            <div class="calendar-header">
                <button class="calendar-nav-btn" id="cal-prev">◀</button>
                <h2 id="calendar-month-year">Month Year</h2>
                <button class="calendar-nav-btn" id="cal-next">▶</button>
            </div>
            <div style="text-align: right; margin-bottom: 10px;">
                <button class="calendar-nav-btn" id="cal-today" data-i18n="btn_today">Hoy</button>
            </div>
            <div class="calendar-grid glass" style="padding: 16px; border-radius: 24px;" id="calendar-matrix">
                <!-- Se inyecta dinámicamente -->
            </div>
        </section>

        <!-- VISTA: TAREAS -->
        <section id="view-tasks" class="view">
            <h1 data-i18n="tasks_title">Actividades</h1>
            <div class="input-group">
                <input type="text" id="task-input-name" placeholder="Nueva tarea..." data-i18n-holder="placeholder_task">
                <input type="time" id="task-input-time" style="max-width: 110px;">
                <button class="btn-action" id="btn-add-task">┼</button>
            </div>
            <div id="tasks-list-render"></div>
        </section>

        <!-- VISTA: NOTAS -->
        <section id="view-notes" class="view">
            <div class="flex-row-center" style="margin-bottom: 20px;">
                <h1 data-i18n="notes_title">Notas Conceptuales</h1>
                <button class="btn-action" id="btn-new-note">┼</button>
            </div>
            <div id="notes-grid-render"></div>
        </section>

    </main>

    <!-- NAVIGATION BAR -->
    <nav class="navbar glass">
        <button class="nav-item active" data-target="view-home">🏠</button>
        <button class="nav-item" data-target="view-calendar">📅</button>
        <button class="nav-item" data-target="view-tasks">✅</button>
        <button class="nav-item" data-target="view-notes">📝</button>
    </nav>

    <!-- DRAWER: CALENDAR CELL DETAILS -->
    <div class="drawer glass" id="drawer-calendar-cell">
        <h2 id="drawer-cell-title">Detalles del Día</h2>
        <div class="input-group" style="margin-top: 14px;">
            <input type="text" id="evt-input-title" placeholder="Evento..." data-i18n-holder="placeholder_event">
            <button class="btn-action" id="btn-add-event">┼</button>
        </div>
        <div class="color-picker">
            <div class="color-opt selected" style="background: var(--color-red);" data-color="red"></div>
            <div class="color-opt" style="background: var(--color-green);" data-color="green"></div>
            <div class="color-opt" style="background: var(--color-yellow);" data-color="yellow"></div>
            <div class="color-opt" style="background: var(--color-blue);" data-color="blue"></div>
        </div>
        <div id="drawer-cell-events-list" style="margin-top: 16px;"></div>
    </div>

    <!-- DRAWER: RICH TEXT EDITOR -->
    <div class="drawer glass" id="drawer-note-editor">
        <h2 data-i18n="editor_title">Editor de Nota</h2>
        <div class="editor-toolbar" style="margin-top: 10px;">
            <button class="editor-btn" data-cmd="formatBlock" data-val="H1">H1</button>
            <button class="editor-btn" data-cmd="formatBlock" data-val="H2">H2</button>
            <button class="editor-btn" data-cmd="formatBlock" data-val="P">P</button>
            <button class="editor-btn" data-cmd="bold">B</button>
            <button class="editor-btn" data-cmd="italic">I</button>
            <button class="editor-btn" id="btn-save-note" style="background: var(--accent-color); color: white;" data-i18n="btn_save">Guardar</button>
        </div>
        <div class="rich-box" contenteditable="true" id="note-rich-body"></div>
    </div>

    <!-- DRAWER: SETTINGS -->
    <div class="drawer glass" id="drawer-settings">
        <h2 data-i18n="settings_title">Configuración</h2>
        
        <div style="margin-top: 16px;">
            <label style="font-size: 14px; font-weight: 600;" data-i18n="setting_theme">Tema de Interfaz</label>
            <select id="setting-theme-select" style="margin-top: 6px; width: 100%;">
                <option value="light" data-i18n="theme_light">Claro</option>
                <option value="dark" data-i18n="theme_dark">Oscuro</option>
                <option value="system" data-i18n="theme_system">Sistema</option>
            </select>
        </div>

        <div style="margin-top: 16px;">
            <label style="font-size: 14px; font-weight: 600;" data-i18n="setting_lang">Idioma / Language</label>
            <select id="setting-lang-select" style="margin-top: 6px; width: 100%;">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="pt">Português</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
                <option value="ko">한국어</option>
            </select>
        </div>

        <!-- Componente Asíncrono de Historial de Novedades (upd.txt) -->
        <div style="margin-top: 24px;">
            <label style="font-size: 14px; font-weight: 600;" data-i18n="changelog_title">Historial de Novedades (upd.txt)</label>
            <div class="changelog-box" id="changelog-render-target">
                <span style="font-size: 12px; color: var(--text-secondary);" data-i18n="loading_updates">Cargando actualizaciones...</span>
            </div>
        </div>
    </div>

    <!-- DRAWER: MANUAL DE USO -->
    <div class="drawer glass" id="cajon-drawer">
        <h2 data-i18n="manual_title">Manual de Uso Colectivo</h2>
        <div style="margin-top: 12px; font-size: 14px; line-height: 1.6; color: var(--text-color);" id="manual-content-body">
            <!-- Inyectado por el diccionario de idiomas -->
        </div>
    </div>

                btn_save: "저장", settings_title: "설정", setting_theme: "인터페이스 테마",
                theme_light: "라이트", theme_dark: "다크", theme_system: "시스템 설정", setting_lang: "언어 설정",
                changelog_title: "업데이트 기록", loading_updates: "upd.txt 불러오는 중...",
                error_updates: "업데이트 내역을 불러올 수 없습니다.",
                manual_title: "사용 안내서",
                manual_html: "<p>안전한 로컬 스토리지를 활용한 미니멀 디자인 생산성 도구입니다.</p>"
            }
        };

        // --- ESTADO INTERNO DE LA APLICACIÓN ---
        let state = {
            userName: localStorage.getItem('userName') || 'Pablo',
            currentLang: localStorage.getItem('lang') || 'es',
            currentTheme: localStorage.getItem('theme') || 'system',
            tasks: JSON.parse(localStorage.getItem('tasks')) || [],
            notes: JSON.parse(localStorage.getItem('notes')) || [],
            events: JSON.parse(localStorage.getItem('events')) || {}, // Estructura: {"YYYY-MM-DD": [{id, title, color}]}
            selectedDateStr: null,
            editingNoteId: null
        };

        let currentCalendarDate = new Date();

        // --- MOTOR DE TRADUCCIÓN REACTIVA ---
        function applyTranslations() {
            const dictionary = i18n[state.currentLang] || i18n['es'];
            
            // Atributos textContent
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dictionary[key]) el.textContent = dictionary[key];
            });

            // Atributos placeholders
            document.querySelectorAll('[data-i18n-holder]').forEach(el => {
                const key = el.getAttribute('data-i18n-holder');
                if (dictionary[key]) el.setAttribute('placeholder', dictionary[key]);
            });

            // Inyección del cuerpo del manual estructurado
            const manualBox = document.getElementById('manual-content-body');
            if(manualBox && dictionary.manual_html) {
                manualBox.innerHTML = dictionary.manual_html;
            }
        }

        // --- CONTROLADORES DE MODALES Y DRAWERS ---
        function openDrawer(id) {
            document.getElementById('global-overlay').classList.add('active');
            document.getElementById(id).classList.add('open');
        }

        function closeAllDrawers() {
            document.getElementById('global-overlay').classList.remove('active');
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            state.editingNoteId = null;
            state.selectedDateStr = null;
        }

        document.getElementById('global-overlay').addEventListener('click', closeAllDrawers);

        // --- RENDERIZADO ASÍNCRONO DEL ARCHIVO UPD.TXT (PARSER) ---
        async function fetchAndRenderChangelog() {
            const container = document.getElementById('changelog-render-target');
            const dictionary = i18n[state.currentLang] || i18n['es'];
            
            try {
                // Petición asíncrona hacia la raíz del dominio
                const response = await fetch('upd.txt');
                if(!response.ok) throw new Error("No encontrado");
                
                const rawText = await response.text();
                const lines = rawText.split('\n');
                
                container.innerHTML = ''; // Limpiar el estado de carga
                
                let currentVersionDiv = null;

                lines.forEach(line => {
                    let cleanLine = line.trim();
                    if(!cleanLine) return;

                    // Expresión regular para detectar versiones (Ej: V2.6.4 o v1.0)
                    if(/^v[0-9]/i.test(cleanLine)) {
                        currentVersionDiv = document.createElement('div');
                        currentVersionDiv.className = 'log-version';
                        currentVersionDiv.textContent = cleanLine;
                        container.appendChild(currentVersionDiv);
                    } else {
                        // Limpieza de guiones de cambios o viñetas
                        if(cleanLine.startsWith('-')) {
                            cleanLine = cleanLine.substring(1).trim();
                        }
                        const item = document.createElement('div');
                        item.className = 'log-item';
                        item.textContent = `• ${cleanLine}`;
                        
                        if(currentVersionDiv) {
                            container.appendChild(item);
                        } else {
                            // Líneas sueltas al inicio sin versión declarada
                            const singleItem = document.createElement('div');
                            singleItem.className = 'log-item';
                            singleItem.style.fontWeight = '600';
                            singleItem.textContent = cleanLine;
                            container.appendChild(singleItem);
                        }
                    }
                });

                if(container.children.length === 0) {
                    container.innerHTML = `<span style="font-size:12px;color:var(--text-secondary);">upd.txt vacío</span>`;
                }

            } catch (err) {
                container.innerHTML = `<span style="font-size: 12px; color: var(--danger-color);">${dictionary.error_updates}</span>`;
            }
        }

        // --- SISTEMA DE ENRUTAMIENTO (VIEWS) ---
        document.querySelectorAll('.nav-item').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                
                button.classList.add('active');
                const targetView = button.getAttribute('data-target');
                document.getElementById(targetView).classList.add('active');

                if(targetView === 'view-calendar') renderCalendar();
                if(targetView === 'view-home') renderHomeSchedule();
                
                updateMetrics();
            });
        });

        // --- COMPONENTE: TAREAS (ACTIVIDADES) ---
        function renderTasks() {
            const container = document.getElementById('tasks-list-render');
            container.innerHTML = '';
            
            state.tasks.forEach(task => {
                const row = document.createElement('div');
                row.className = `item-row glass ${task.completed ? 'completed' : ''}`;
                
                row.innerHTML = `
                    <div class="item-left">
                        <div class="checkbox-custom ${task.completed ? 'checked' : ''}" onclick="toggleTask('${task.id}')"></div>
                        <span class="item-text" style="font-weight:500;">${task.name}</span>
                        ${task.time ? `<span class="schedule-time">⏰ ${task.time}</span>` : ''}
                    </div>
                    <button class="mini-btn" style="color:var(--danger-color);" onclick="deleteTask('${task.id}')">✕</button>
                `;
                container.appendChild(row);
            });
            updateMetrics();
        }

        document.getElementById('btn-add-task').addEventListener('click', () => {
            const nameInput = document.getElementById('task-input-name');
            const timeInput = document.getElementById('task-input-time');
            if(!nameInput.value.trim()) return;

            state.tasks.push({
                id: 'task_' + Date.now(),
                name: nameInput.value.trim(),
                time: timeInput.value || null,
                completed: false
            });

            nameInput.value = '';
            timeInput.value = '';
            localStorage.setItem('tasks', JSON.stringify(state.tasks));
            renderTasks();
        });

        window.toggleTask = function(id) {
            state.tasks = state.tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            localStorage.setItem('tasks', JSON.stringify(state.tasks));
            renderTasks();
        };

        window.deleteTask = function(id) {
            state.tasks = state.tasks.filter(t => t.id !== id);
            localStorage.setItem('tasks', JSON.stringify(state.tasks));
            renderTasks();
        };

        // --- COMPONENTE: CALENDARIO ---
        function renderCalendar() {
            const matrix = document.getElementById('calendar-matrix');
            const title = document.getElementById('calendar-month-year');
            matrix.innerHTML = '';

            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();

            title.textContent = currentCalendarDate.toLocaleDateString(state.currentLang, { month: 'long', year: 'numeric' }).toUpperCase();

            // Rótulos de días de la semana extendidos
            const dummyDate = new Date(2026, 0, 5); // Un lunes de referencia
            for(let i=0; i<7; i++) {
                const dayLabel = document.createElement('div');
                dayLabel.className = 'weekday-label';
                dayLabel.textContent = dummyDate.toLocaleDateString(state.currentLang, { weekday: 'short' }).substring(0,2).toUpperCase();
                matrix.appendChild(dayLabel);
                dummyDate.setDate(dummyDate.getDate() + 1);
            }

            const firstDayIndex = new Date(year, month, 1).getDay();
            const transformIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1; // Ajuste a inicio Lunes
            const totalDays = new Date(year, month + 1, 0).getDate();

            // Celdas vacías del mes anterior
            for(let i=0; i<transformIndex; i++) {
                const emptyCell = document.createElement('div');
                matrix.appendChild(emptyCell);
            }

            // Días efectivos del mes
            const today = new Date();
            for(let day=1; day<=totalDays; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                cell.textContent = day;

                const currentStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                
                if(day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    cell.classList.add('today');
                }

                // Renderizado de indicadores de color internos por evento asignado
                if(state.events[currentStr] && state.events[currentStr].length > 0) {
                    const dotsWrap = document.createElement('div');
                    dotsWrap.className = 'day-dots';
                    state.events[currentStr].slice(0, 3).forEach(evt => {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        dot.style.backgroundColor = `var(--color-${evt.color})`;
                        dotsWrap.appendChild(dot);
                    });
                    cell.appendChild(dotsWrap);
                }

                cell.addEventListener('click', () => openDayCellDrawer(currentStr, day));
                matrix.appendChild(cell);
            }
        }

        document.getElementById('cal-prev').addEventListener('click', () => { currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1); renderCalendar(); });
        document.getElementById('cal-next').addEventListener('click', () => { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1); renderCalendar(); });
        document.getElementById('cal-today').addEventListener('click', () => { currentCalendarDate = new Date(); renderCalendar(); });

        function openDayCellDrawer(dateStr, dayNum) {
            state.selectedDateStr = dateStr;
            document.getElementById('drawer-cell-title').textContent = `${dayNum} - ${currentCalendarDate.toLocaleDateString(state.currentLang, {month: 'long'})}`;
            renderCellEvents();
            openDrawer('drawer-calendar-cell');
        }

        function renderCellEvents() {
            const list = document.getElementById('drawer-cell-events-list');
            list.innerHTML = '';
            const dayEvents = state.events[state.selectedDateStr] || [];

            dayEvents.forEach(evt => {
                const node = document.createElement('div');
                node.className = 'item-row glass';
                node.style.borderLeft = `5px solid var(--color-${evt.color})`;
                node.innerHTML = `
                    <span style="font-weight:600;">${evt.title}</span>
                    <button class="mini-btn" style="color:var(--danger-color);" onclick="deleteEvent('${evt.id}')">✕</button>
                `;
                list.appendChild(node);
            });
        }

        // Selección activa de etiquetas de color en el editor de celdas
        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            });
        });

        document.getElementById('btn-add-event').addEventListener('click', () => {
            const titleInput = document.getElementById('evt-input-title');
            if(!titleInput.value.trim() || !state.selectedDateStr) return;

            const selectedColorOpt = document.querySelector('.color-opt.selected');
            const color = selectedColorOpt ? selectedColorOpt.getAttribute('data-color') : 'blue';

            if(!state.events[state.selectedDateStr]) state.events[state.selectedDateStr] = [];
            
            state.events[state.selectedDateStr].push({
                id: 'evt_' + Date.now(),
                title: titleInput.value.trim(),
                color: color
            });

            titleInput.value = '';
            localStorage.setItem('events', JSON.stringify(state.events));
            renderCellEvents();
            renderCalendar();
            updateMetrics();
        });

        window.deleteEvent = function(id) {
            if(!state.selectedDateStr) return;
            state.events[state.selectedDateStr] = state.events[state.selectedDateStr].filter(e => e.id !== id);
            if(state.events[state.selectedDateStr].length === 0) delete state.events[state.selectedDateStr];
            
            localStorage.setItem('events', JSON.stringify(state.events));
            renderCellEvents();
            renderCalendar();
            updateMetrics();
        };

        // --- COMPONENTE: CRONOGRAMA DE INICIO ---
        function renderHomeSchedule() {
            const container = document.getElementById('day-schedule-render');
            container.innerHTML = '';

            // Filtrado estricto de tareas que poseen una métrica horaria definida
            const timedTasks = state.tasks.filter(t => t.time && !t.completed);
            
            // Ordenación ascendente por hora cronológica
            timedTasks.sort((a, b) => a.time.localeCompare(b.time));

            if(timedTasks.length === 0) {
                container.innerHTML = `<span style="font-size: 13px; color: var(--text-secondary);">No hay actividades programadas para hoy.</span>`;
                return;
            }

            timedTasks.forEach(task => {
                const item = document.createElement('div');
                item.className = 'schedule-item';
                item.innerHTML = `
                    <span class="schedule-time">${task.time}</span>
                    <span style="font-size:14px; font-weight:500;">${task.name}</span>
                `;
                container.appendChild(item);
            });
        }

        // --- COMPONENTE: NOTAS CONCEPTUALES ---
        function renderNotes() {
            const container = document.getElementById('notes-grid-render');
            container.innerHTML = '';

            state.notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'dash-card glass';
                card.style.cursor = 'pointer';
                card.style.minHeight = '100px';
                
                // Sanitización del título del nodo HTML para la visualización de la tarjeta
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = note.body;
                const plainText = tempDiv.textContent || tempDiv.innerText || 'Nota vacía';
                
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; width:100%;">
                        <div style="font-size:14px; font-weight:500; line-height:1.4; color:var(--text-color); display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical; overflow:hidden;">
                            ${plainText}
                        </div>
                        <button class="mini-btn" style="color:var(--danger-color); font-size:14px;" onclick="event.stopPropagation(); deleteNote('${note.id}')">✕</button>
                    </div>
                `;
                card.addEventListener('click', () => openNoteEditor(note.id));
                container.appendChild(card);
            });
        }

        function openNoteEditor(id = null) {
            state.editingNoteId = id;
            const editor = document.getElementById('note-rich-body');
            
            if(id) {
                const note = state.notes.find(n => n.id === id);
                editor.innerHTML = note ? note.body : '';
            } else {
                editor.innerHTML = '<h1></h1><p></p>';
            }
            openDrawer('drawer-note-editor');
        }

        document.getElementById('btn-new-note').addEventListener('click', () => openNoteEditor(null));

        // Comandos nativos estructurales WYSIWYG
        document.querySelectorAll('.editor-btn[data-cmd]').forEach(btn => {
            btn.addEventListener('click', () => {
                const cmd = btn.getAttribute('data-cmd');
                const val = btn.getAttribute('data-val') || null;
                document.execCommand(cmd, false, val);
            });
        });

        document.getElementById('btn-save-note').addEventListener('click', () => {
            const htmlContent = document.getElementById('note-rich-body').innerHTML;
            
            if(state.editingNoteId) {
                state.notes = state.notes.map(n => n.id === state.editingNoteId ? {...n, body: htmlContent} : n);
            } else {
                state.notes.push({
                    id: 'note_' + Date.now(),
                    body: htmlContent
                });
            }

            localStorage.setItem('notes', JSON.stringify(state.notes));
            closeAllDrawers();
            renderNotes();
        });

        window.deleteNote = function(id) {
            state.notes = state.notes.filter(n => n.id !== id);
            localStorage.setItem('notes', JSON.stringify(state.notes));
            renderNotes();
        };

        // --- SISTEMA DE MÉTRICAS GLOBALES ---
        function updateMetrics() {
            document.getElementById('count-tasks').textContent = state.tasks.filter(t => !t.completed).length;
            
            const currentYear = currentCalendarDate.getFullYear();
            const currentMonth = String(currentCalendarDate.getMonth() + 1).padStart(2, '0');
            let matchCount = 0;

            Object.keys(state.events).forEach(dateKey => {
                if(dateKey.startsWith(`${currentYear}-${currentMonth}`)) {
                    matchCount += state.events[dateKey].length;
                }
            });
            document.getElementById('count-events').textContent = matchCount;
        }

        // --- MANEJADORES DE CONFIGURACIÓN Y PERFIL ---
        document.getElementById('user-profile-name').textContent = state.userName;
        document.getElementById('user-profile-name').addEventListener('blur', (e) => {
            state.userName = e.target.textContent.trim() || 'User';
            localStorage.setItem('userName', state.userName);
        });

        document.getElementById('btn-trigger-settings').addEventListener('click', () => {
            document.getElementById('setting-theme-select').value = state.currentTheme;
            document.getElementById('setting-lang-select').value = state.currentLang;
            fetchAndRenderChangelog(); // Consulta asíncrona del archivo upd.txt cada vez que se abren los ajustes
            openDrawer('drawer-settings');
        });

        document.getElementById('btn-trigger-manual').addEventListener('click', () => {
            openDrawer('cajon-drawer');
        });

        document.getElementById('setting-theme-select').addEventListener('change', (e) => {
            state.currentTheme = e.target.value;
            localStorage.setItem('theme', state.currentTheme);
            
            let targetTheme = state.currentTheme;
            if(state.currentTheme === 'system') {
                targetTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', targetTheme);
        });

        document.getElementById('setting-lang-select').addEventListener('change', (e) => {
            state.currentLang = e.target.value;
            localStorage.setItem('lang', state.currentLang);
            applyTranslations();
            if(document.getElementById('view-calendar').classList.contains('active')) renderCalendar();
        });

        // Escucha de cambios de tema en el sistema operativo en tiempo real
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if(state.currentTheme === 'system') {
                const targetTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', targetTheme);
            }
        });

        // --- MOTOR DE NOTIFICACIONES Y SÍNTESIS DE AUDIO (WEB AUDIO API) ---
        if (Notification.permission === 'default') {
            document.body.addEventListener('click', () => {
                Notification.requestPermission();
            }, { once: true });
        }

        function triggerContextualBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); // Tono de notificación limpio (A5)
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch(e){}
        }

        // Bucle en segundo plano activo (Revisión cada 25 segundos)
        setInterval(() => {
            const now = new Date();
            const currentHourStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            state.tasks.forEach(task => {
                if(task.time === currentHourStr && !task.completed && !task.notified) {
                    task.notified = true; // Flag de prevención de bucle
                    
                    if (Notification.permission === 'granted') {
                        new Notification("Productivity OS", { body: task.name });
                    }
                    triggerContextualBeep();
                }
            });
        }, 25000);

        // --- INICIALIZACIÓN GLOBAL ---
        applyTranslations();
        renderTasks();
        renderNotes();
        renderHomeSchedule();
        updateMetrics();
    </script>
