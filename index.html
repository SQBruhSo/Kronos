<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Organizador Personal</title>
    
    <link class="fav-icon-tag" rel="icon" type="image/png" href="https://i.ibb.co/pBwLqf1v/Dise-o-sin-t-tulo.png">
    <link class="apple-touch-icon" href="https://i.ibb.co/5h1j0fr3/Dise-o-sin-t-tulo.png">

    <script>
        (function() {
            const isMobile = /Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent) || window.innerWidth <= 768;
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            
            if (isMobile) {
                manifestLink.href = './manifest.json';
            } else {
                manifestLink.href = './manifest-pc.json';
            }
            document.head.appendChild(manifestLink);

            let rawData = localStorage.getItem('aura_studio_data');
            if (rawData) {
                try {
                    let d = JSON.parse(rawData);
                    let theme = d.theme || 'light';
                    if (theme === 'system') {
                        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    }
                    document.documentElement.setAttribute('data-theme', theme);
                } catch(e){}
            }
        })();
    </script>
    
    <style>
        :root {
            --bg-color: #F4F5F6;
            --card-bg: #FFFFFF;
            --text-main: #111214;
            --text-muted: #626469;
            --accent-brand: #6B1D2F; 
            --accent-green: #2E7D32;
            --accent-yellow: #C67B00;
            --border-color: #E2E4E7;
            --input-bg: #F4F5F6;
            --aura-bezier: cubic-bezier(0.34, 1.56, 0.64, 1);
            --fade-bezier: cubic-bezier(0.25, 1, 0.5, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0B0C0E;
            --card-bg: #16181B;
            --text-main: #ECEEDF;
            --text-muted: #9AA0A6;
            --border-color: #2D3135;
            --input-bg: #212327;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .phone-container {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: cardEntrance 0.5s var(--fade-bezier) backwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .btn-back {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s var(--fade-bezier);
        }
        .btn-back:hover { background: rgba(0,0,0,0.05); transform: translateY(-1px); }
        [data-theme="dark"] .btn-back:hover { background: rgba(255,255,255,0.05); }

        .btn-today {
            background: transparent;
            color: var(--accent-brand);
            border: 1px solid var(--accent-brand);
            padding: 6px 14px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        .btn-today:hover { background: rgba(107, 29, 47, 0.05); }

        .view {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.2s var(--fade-bezier), transform 0.2s var(--fade-bezier);
        }

        .view.hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.97);
        }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .welcome-title {
            font-size: 22px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -0.4px;
        }
        .welcome-title span {
            color: var(--accent-brand);
            font-weight: 700;
            cursor: pointer;
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 22px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
            border: 1px solid rgba(0, 0, 0, 0.01);
            transition: all 0.25s var(--aura-bezier);
        }
        .menu-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            border-color: var(--border-color);
        }
        .menu-item:active { transform: scale(0.95); }

        .menu-item .icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.3s var(--aura-bezier);
        }
        .menu-item:hover .icon { transform: scale(1.1) rotate(4deg); }
        .menu-item span { font-size: 13px; font-weight: 600; color: var(--text-main); }

        .list-preview { list-style: none; display: flex; flex-direction: column; gap: 14px; }
        .list-preview li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
        }

        .time-badge {
            background: var(--bg-color);
            color: var(--accent-brand);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        .task-text { cursor: pointer; display: flex; align-items: center; gap: 12px; flex: 1; overflow: hidden; }
        .task-text span { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-text.completed span { text-decoration: line-through; color: var(--text-muted); opacity: 0.6; }
        .task-text input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent-brand); cursor: pointer; }

        .btn-delete {
            background: transparent; color: var(--text-muted); border: none; font-size: 18px; cursor: pointer;
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .btn-delete:hover { background: #FCE8E6; color: #C5221F; }

        .task-input-container { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
        .input-row-bottom { display: flex; gap: 10px; }

        .input-flat {
            flex: 1; background: var(--input-bg); border: 1px solid transparent; padding: 14px 16px; border-radius: 14px;
            font-size: 15px; color: var(--text-main); outline: none; transition: all 0.2s var(--fade-bezier);
        }
        .input-flat:focus { border-color: var(--accent-brand); background: var(--card-bg); box-shadow: 0 4px 12px rgba(107,29,47,0.04); }

        .btn-add {
            background: var(--text-main); color: var(--card-bg); border: none; padding: 0 22px; border-radius: 14px;
            font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s var(--fade-bezier);
        }
        .btn-add:hover { background: var(--accent-brand); color: white; transform: translateY(-1px); }

        .format-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; background: var(--bg-color); padding: 6px; border-radius: 14px; }
        .format-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-main); }
        .format-btn:hover { background: var(--accent-brand); color: #FFFFFF; border-color: var(--accent-brand); }

        .rich-editor { width: 100%; height: 220px; background: var(--bg-color); border: 1px solid transparent; padding: 16px; border-radius: 16px; font-size: 15px; color: var(--text-main); outline: none; overflow-y: auto; text-align: left; }
        .rich-editor:focus { border-color: var(--accent-brand); background: var(--card-bg); box-shadow: 0 4px 12px rgba(107,29,47,0.04); }
        
        /* Contenedor personalizado para renderizado de marcas H1, H2, T */
        .note-view-body h1 { font-size: 20px; font-weight: 700; margin: 12px 0 6px 0; color: var(--text-main); }
        .note-view-body h2 { font-size: 16px; font-weight: 600; margin: 10px 0 4px 0; color: var(--accent-brand); }
        .note-view-body p { font-size: 14px; line-height: 1.5; color: var(--text-main); margin-bottom: 8px; }

        .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .calendar-title-container { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .calendar-title { font-size: 17px; font-weight: 600; text-transform: capitalize; }
        .weekdays-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        
        .calendar-day {
            background: transparent; color: var(--text-main); aspect-ratio: 1; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500;
            cursor: pointer; border: 1px solid transparent; transition: all 0.2s var(--fade-bezier);
        }
        .calendar-day:hover:not(.empty) { background: rgba(0,0,0,0.05); }
        [data-theme="dark"] .calendar-day:hover:not(.empty) { background: rgba(255,255,255,0.05); }
        .calendar-day.empty { background: transparent; cursor: default; }
        .calendar-day.selected { border-color: var(--accent-brand) !important; color: var(--accent-brand) !important; font-weight: 700; }
        .calendar-day.current-today { background: var(--accent-brand) !important; color: white !important; font-weight: 700; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(17, 18, 20, 0.4); backdrop-filter: blur(4px); z-index: 99; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -45%) scale(0.95); background: var(--card-bg); border-radius: 24px; padding: 24px; z-index: 100; width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); opacity: 0; transition: all 0.25s var(--aura-bezier); max-height: 90vh; overflow-y: auto; }
        .modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .note-item-btn { text-align: left; font-weight: 500; cursor: pointer; background: var(--card-bg); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; width: 100%; }
        .note-item-btn svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
        
        .color-picker { display: flex; gap: 12px; margin: 14px 0; }
        .color-opt { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-opt.active { border-color: var(--text-main); transform: scale(1.15); }

        .icon svg { width: 22px; height: 22px; fill: currentColor; color: white; }
        h3 { font-size: 17px; font-weight: 600; color: var(--text-main); }
        
        .btn-back.hidden-install { display: none !important; }

        .config-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; text-align: left; }
        .config-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .custom-select { width: 100%; padding: 12px; border-radius: 12px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); font-size: 14px; outline: none; }
        
        .toggle-container { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; width: 100%; }
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-brand); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div id="view-home" class="view">
            <div class="card brand-header">
                <div class="welcome-title" id="txt-home-title">Control de <span id="username-display" onclick="openModal('username-modal')">Espacio</span></div>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button class="btn-back" id="btn-install-pwa" style="padding: 6px 14px; font-size: 12px; display: none;">
                        <svg style="width:14px; height:14px;" viewBox="0 0 24 24"><path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                        <span id="txt-install">Instalar app</span>
                    </button>
                    <button class="btn-back" style="padding: 8px; border-radius: 50%;" onclick="openModal('config-modal')">
                        <svg style="width:18px; height:18px;" viewBox="0 0 24 24"><path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5A3.5 3.5 0 0 1 15.5 12A3.5 3.5 0 0 1 12 15.5M19.43 12.97c.04-.32.07-.65.07-.97c0-.32-.03-.65-.07-.97l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.39-1.09-.73-1.71-.98l-.37-2.65A.506.506 0 0 0 14 3h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.63c-.04.32-.07.65-.07.97c0 .32.03.65.07.97l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.39 1.09.73 1.71.98l.37 2.65c.04.24.25.42.49.42h4c.25 0 .46-.18.49-.42l.37-2.65c.61-.25 1.17-.59 1.71-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63Z"/></svg>
                    </button>
                </div>
            </div>

            <div class="grid-menu">
                <div class="menu-item" onclick="changeView('view-calendar')">
                    <div class="icon" style="background-color: var(--accent-brand);"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg></div>
                    <span id="txt-menu-events">Eventos</span>
                </div>
                <div class="menu-item" onclick="changeView('view-tasks')">
                    <div class="icon" style="background-color: var(--accent-green);"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg></div>
                    <span id="txt-menu-tasks">Pendientes</span>
                </div>
                <div class="menu-item" onclick="changeView('view-notes')">
                    <div class="icon" style="background-color: var(--accent-yellow);"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
                    <span id="txt-menu-notes">Notas fijas</span>
                </div>
            </div>

            <div class="card">
                <h3 id="txt-cronograma-title" style="margin-bottom: 16px;">Cronograma del Día</h3>
                <ul id="home-tasks-list" class="list-preview"></ul>
            </div>
        </div>

        <div id="view-calendar" class="view hidden">
            <div class="card header-box">
                <span id="txt-cal-header">Agenda Mensual</span>
                <button class="btn-back btn-lbl-back" onclick="changeView('view-home')">Volver</button>
            </div>
            <div class="card">
                <div class="calendar-controls">
                    <button class="btn-back" style="padding: 6px 12px;" onclick="changeMonth(-1)">◀</button>
                    <div class="calendar-title-container">
                        <div class="calendar-title" id="calendar-month-year"></div>
                        <button class="btn-today" id="txt-cal-today" onclick="goToCurrentMonth()">Hoy</button>
                    </div>
                    <button class="btn-back" style="padding: 6px 12px;" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="weekdays-grid" id="calendar-weekdays"></div>
                <div class="calendar-grid" id="calendar-grid-box"></div>
                
                <div id="calendar-detail-box" style="display:none; border-top:1px solid var(--border-color); padding-top:16px; margin-top:14px;">
                    <h3 id="txt-cal-detail" style="color:var(--accent-brand); font-size:15px; margin-bottom: 4px;">Detalles del día</h3>
                    <p id="cal-detail-text" style="margin-bottom: 14px; font-size:14px; color:var(--text-muted);"></p>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-back" id="btn-edit-cal" style="background:var(--accent-brand); color:white; border:none; flex: 1;">Asignar</button>
                        <button class="btn-back" id="btn-delete-cal" style="color:red; border-color:rgba(255,0,0,0.2);">Remover</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-tasks" class="view hidden">
            <div class="card header-box">
                <span id="txt-tasks-header">Lista de Actividades</span>
                <button class="btn-back btn-lbl-back" onclick="changeView('view-home')">Volver</button>
            </div>
            <div class="card">
                <div id="tasks-container" style="display:flex; flex-direction:column;"></div>
                <div class="task-input-container">
                    <input type="text" id="task-input" class="input-flat" maxlength="50" placeholder="Nombre de la actividad...">
                    <div class="input-row-bottom">
                        <input type="text" id="task-time" class="input-flat" style="text-align:center;" maxlength="5" placeholder="Hora (ej. 17:30)">
                        <button class="btn-add" id="btn-task-add" style="flex: 1;" onclick="addTask()">Añadir</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-notes" class="view hidden">
            <div class="card header-box">
                <span id="txt-notes-header">Bloque de Notas</span>
                <button class="btn-back btn-lbl-back" onclick="changeView('view-home')">Volver</button>
            </div>
            <div class="card">
                <div id="notes-container" style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;"></div>
                <div class="input-group" style="display:flex; gap:10px;">
                    <input type="text" id="note-title-input" class="input-flat" maxlength="30" placeholder="Título de la nota...">
                    <button class="btn-add" id="btn-note-create" onclick="addNote()">Crear</button>
                </div>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="overlay" onclick="closeModals()"></div>

    <div class="modal" id="config-modal">
        <h3 id="txt-modal-config-title" style="margin-bottom:20px;">Configuración</h3>
        
        <div class="config-group">
            <label id="lbl-lang" for="lang-select">Idioma / Language</label>
            <select id="lang-select" class="custom-select" onchange="changeLanguage(this.value)">
                <option value="es">Español</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="config-group">
            <label id="lbl-theme" for="theme-select">Tema de la interfaz</label>
            <select id="theme-select" class="custom-select" onchange="changeTheme(this.value)">
                <option value="light" id="opt-theme-light">Claro</option>
                <option value="dark" id="opt-theme-dark">Oscuro</option>
                <option value="system" id="opt-theme-system">Predeterminado del sistema</option>
            </select>
        </div>

        <div class="config-group">
            <label id="lbl-update-filter" for="update-filter-select">Filtro de Actualizaciones</label>
            <select id="update-filter-select" class="custom-select" onchange="changeUpdateFilter(this.value)">
                <option value="major">Solo Updates (1.0.0)</option>
                <option value="minor">Updates y Subupdates (1.1.0)</option>
                <option value="patch">Updates, Subupdates y Bugs (1.1.1)</option>
            </select>
        </div>

        <div class="config-group">
            <label id="lbl-notify-title">Alertas del Sistema</label>
            <div class="toggle-container">
                <span id="lbl-notify-desc" style="font-size: 13px; color: var(--text-muted);">Activar notificaciones nativas</span>
                <label class="switch">
                    <input type="checkbox" id="notify-toggle" onchange="toggleNotifications(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        // Recuperación y carga local

        // --- SISTEMA INTELEGENTE DE PARSEO DE SINTAXIS PERSONALIZADA (H1, H2, T, **, *) ---
        function parseCustomSyntax(text) {
            if (!text) return "";
            
            // Sanitizar HTML nativo previo para evitar vulnerabilidades e inyecciones
            let clean = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            let lines = clean.split('\n');
            let parsedLines = lines.map(line => {
                let trimmed = line.trim();
                
                // Evaluar Títulos H1 (# Titulo o H1 Titulo)
                if (trimmed.startsWith('# ')) {
                    return `<h1>${trimmed.substring(2)}</h1>`;
                } else if (trimmed.startsWith('H1 ')) {
                    return `<h1>${trimmed.substring(3)}</h1>`;
                }
                
                // Evaluar Subtítulos H2 (## Subtitulo o H2 Subtitulo)
                if (trimmed.startsWith('## ')) {
                    return `<h2>${trimmed.substring(3)}</h2>`;
                } else if (trimmed.startsWith('H2 ')) {
                    return `<h2>${trimmed.substring(3)}</h2>`;
                }
                
                // Evaluar Texto Normal Explicitado (T Texto)
                if (trimmed.startsWith('T ')) {
                    return `<p>${trimmed.substring(2)}</p>`;
                }
                
                // Si no tiene marca, tratarlo como párrafo plano si contiene texto
                return trimmed.length > 0 ? `<p>${trimmed}</p>` : '<br>';
            });

            let combined = parsedLines.join('');

            // Procesar Negritas (Soporta **texto** e iguala marcas nativas b si existen)
            combined = combined.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
            
            // Procesar Cursivas (Soporta *texto* e iguala marcas nativas i si existen)
            combined = combined.replace(/\*(.*?)\*/g, "<i>$1</i>");

            return combined;
        }

        // Insertar marcas en la posición del cursor dentro del textarea de notas
        function insertCustomFormat(before, after = "") {
            const txtarea = document.getElementById('modal-note-body');
            const start = txtarea.selectionStart;
            const end = txtarea.selectionEnd;
            const text = txtarea.value;
            const selected = text.substring(start, end);
            
            const replacement = before + selected + after;
            txtarea.value = text.substring(0, start) + replacement + text.substring(end);
            
            txtarea.focus();
            txtarea.selectionStart = start + before.length;
            txtarea.selectionEnd = start + before.length + selected.length;
        }

        // --- CONTROLADOR CENTRALIZADO DE VERSIONES (SemVer Filter) ---
        function procesarUpdateAlerta(version, titulo, desc) {
            if (!data.updateFilter) data.updateFilter = "major";
            
            const segments = version.split('.');
            if (segments.length !== 3) return; // Validación estructural básica

            const isPatch = segments[2] !== '0'; // Cambios en bugs (0.0.x)
            const isMinor = segments[1] !== '0' && segments[2] === '0'; // Subupdates (0.x.0)
            const isMajor = segments[0] !== '0' && segments[1] === '0' && segments[2] === '0'; // Updates principales (x.0.0)

            let permitirNotificacion = false;

            if (data.updateFilter === "major" && isMajor) {
                permitirNotificacion = true;
            } else if (data.updateFilter === "minor" && (isMajor || isMinor)) {
                permitirNotificacion = true;
            } else if (data.updateFilter === "patch") {
                permitirNotificacion = true; // Permite todas (major, minor y patch)
            }

            if (permitirNotificacion) {
                enviarNotificacion(`Actualización ${version}: ${titulo}`, desc);
            }
        }

        function changeUpdateFilter(val) {
            data.updateFilter = val;
            saveData();
        }

        // Persistencia interna
        function saveData() {
            localStorage.setItem('aura_studio_data', JSON.stringify(data));
        }

        function changeView(viewId) {
            document.getElementById(activeView).classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
            activeView = viewId;
            renderEverything();
        }

        function openModal(modalId) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(modalId).classList.add('active');
            if (modalId === 'username-modal') {
                document.getElementById('username-input').value = data.username;
            }
        }

        function closeModals() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function changeTheme(val) {
            data.theme = val;
            let target = val;
            if(val === 'system') {
                target = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', target);
            saveData();
        }

        function changeLanguage(langCode) {
            if (langCode === 'es' || langCode === 'en') {
                data.lang = langCode;
                saveData();
                renderEverything();
            }
        }

        function saveUsername() {
            const input = document.getElementById('username-input').value.trim();
            if(input) {
                data.username = input;
                saveData();
                renderEverything();
                closeModals();
            }
        }

        function toggleNotifications(checked) {
            if (checked) {
                if ('Notification' in window) {
                    Notification.requestPermission().then(permission => {
                        data.notifications = (permission === 'granted');
                        document.getElementById('notify-toggle').checked = data.notifications;
                        saveData();
                    });
                } else {
                    alert("Tu navegador no soporta notificaciones.");
                    document.getElementById('notify-toggle').checked = false;
                }
            } else {
                data.notifications = false;
                saveData();
            }
        }

        function enviarNotificacion(titulo, cuerpo) {
            if (data.notifications && 'Notification' in window && Notification.permission === 'granted') {
                try {
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification(titulo, {
                            body: cuerpo,
                            icon: 'https://i.ibb.co/5h1j0fr3/Dise-o-sin-t-tulo.png',
                            badge: 'https://i.ibb.co/5h1j0fr3/Dise-o-sin-t-tulo.png'
                        });
                    });
                } catch(e) {
                    new Notification(titulo, { body: cuerpo });
                }
            }
        }

        // Sección de Tareas Pendientes
        function addTask() {
            const text = document.getElementById('task-input').value.trim();
            const time = document.getElementById('task-time').value.trim();
            if (!text) return;
            data.tasks.push({ text, time, completed: false });
            document.getElementById('task-input').value = "";
            document.getElementById('task-time').value = "";
            saveData();
            renderEverything();
        }

        function toggleTask(index) {
            data.tasks[index].completed = !data.tasks[index].completed;
            saveData();
            renderEverything();
        }

        function deleteTask(index) {
            data.tasks.splice(index, 1);
            saveData();
            renderEverything();
        }

        // Sección de Notas Conceptuales
        function addNote() {
            const title = document.getElementById('note-title-input').value.trim();
            if (!title) return;
            data.notes.push({ title, body: "T Escribe contenido aquí..." });
            document.getElementById('note-title-input').value = "";
            saveData();
            renderEverything();
        }

        function openNote(index) {
            currentNoteIndex = index;
            const note = data.notes[index];
            document.getElementById('modal-note-title').innerText = note.title;
            document.getElementById('modal-note-body').value = note.body || "";
            
            document.getElementById('btn-delete-note-trigger').onclick = () => {
                data.notes.splice(currentNoteIndex, 1);
                saveData();
                renderEverything();
                closeModals();
            };
            
            openModal('note-modal');
        }

        function saveNoteBody() {
            if (currentNoteIndex !== null) {
                data.notes[currentNoteIndex].body = document.getElementById('modal-note-body').value;
                saveData();
                renderEverything();
                closeModals();
            }
        }

        // Sección Agenda / Calendario Mensual
        function renderCalendar() {
            const t = translations[data.lang];
            const monthBox = document.getElementById('calendar-month-year');
            monthBox.innerText = `${t.months[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            
            const weekdaysBox = document.getElementById('calendar-weekdays');
            weekdaysBox.innerHTML = t.weekdays.map(w => `<div>${w}</div>`).join('');
            
            const grid = document.getElementById('calendar-grid-box');
            grid.innerHTML = "";
            
            const firstDayIndex = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const totalDays = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = "calendar-day empty";
                grid.appendChild(emptyCell);
            }
            
            const today = new Date();
            for (let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = "calendar-day";
                dayCell.innerText = day;
                
                const dStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                
                if (data.calendar[dStr]) {
                    dayCell.style.backgroundColor = data.calendar[dStr].color + "20";
                    dayCell.style.color = data.calendar[dStr].color;
                    dayCell.style.border = `1px solid ${data.calendar[dStr].color}`;
                }
                
                if (day === today.getDate() && currentDate.getMonth() === today.getMonth() && currentDate.getFullYear() === today.getFullYear()) {
                    dayCell.classList.add('current-today');
                }
                
                if (selectedDayStr === dStr) {
                    dayCell.classList.add('selected');
                }
                
                dayCell.onclick = () => selectCalendarDay(dStr, day);
                grid.appendChild(dayCell);
            }
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function goToCurrentMonth() {
            currentDate = new Date();
            renderCalendar();
        }

        function selectCalendarDay(dStr, dayNum) {
            selectedDayStr = dStr;
            renderCalendar();
            
            const t = translations[data.lang];
            const detailBox = document.getElementById('calendar-detail-box');
            const detailText = document.getElementById('cal-detail-text');
            
            detailBox.style.display = "block";
            
            if (data.calendar[dStr]) {

            document.getElementById('btn-edit-cal').onclick = () => {

                openModal('calendar-modal');

            document.getElementById('btn-delete-cal').onclick = () => {

                    delete data.calendar[dStr];
                    saveData();
                    selectCalendarDay(dStr, dayNum);
                }
            };
        }

        function saveCalendarEvent() {

                renderCalendar();
                
                const dayNum = parseInt(selectedDayStr.split('-')[2]);
                selectCalendarDay(selectedDayStr, dayNum);
            }
        }

        // Renderizado Dinámico General
        function renderEverything() {
            const t = translations[data.lang];
            
            // Asignación de Textos Según Idioma Activo
            document.getElementById('txt-home-title').innerHTML = `${t.homeTitle}<span id="username-display" onclick="openModal('username-modal')">${data.username}</span>`;
            document.getElementById('txt-install').innerText = t.install;

            document.getElementById('txt-menu-notes').innerText = t.menuNotes;

            document.getElementById('txt-tasks-header').innerText = t.tasksHeader;
            document.getElementById('txt-notes-header').innerText = t.notesHeader;
            document.getElementById('txt-modal-config-title').innerText = t.configTitle;
            document.getElementById('lbl-lang').innerText = t.lblLang;
            document.getElementById('lbl-theme').innerText = t.lblTheme;
            document.getElementById('opt-theme-light').innerText = t.themeLight;
            document.getElementById('opt-theme-dark').innerText = t.themeDark;

            document.getElementById('lbl-notify-title').innerText = t.lblNotifyTitle;
            document.getElementById('lbl-notify-desc').innerText = t.lblNotifyDesc;
            document.getElementById('txt-modal-id-title').innerText = t.idTitle;
            document.getElementById('txt-modal-plan-title').innerText = t.planTitle;
            document.getElementById('lbl-cal-color').innerText = t.calColor;
            document.getElementById('btn-cal-save-evt').innerText = t.calFix;
            document.getElementById('task-input').placeholder = t.placeholderTask;
            document.getElementById('task-time').placeholder = t.placeholderTime;
            document.getElementById('btn-task-add').innerText = t.btnAdd;
            document.getElementById('note-title-input').placeholder = t.placeholderNote;
            document.getElementById('btn-note-create').innerText = t.btnCreate;
            document.getElementById('btn-edit-cal').innerText = t.calAsignar;
            document.getElementById('btn-delete-cal').innerText = t.calRemover;
            
            document.querySelectorAll('.btn-lbl-back').forEach(b => b.innerText = t.btnVolver);
            document.querySelectorAll('.btn-lbl-close').forEach(b => b.innerText = t.btnClose);
            document.querySelectorAll('.btn-lbl-save').forEach(b => b.innerText = t.btnSave);
            document.querySelectorAll('.btn-lbl-delete').forEach(b => b.innerText = t.btnDelete);

            document.getElementById('lang-select').value = data.lang;
            document.getElementById('theme-select').value = data.theme;
            document.getElementById('update-filter-select').value = data.updateFilter || "major";
            document.getElementById('notify-toggle').checked = !!data.notifications;

            // Render de tareas en Home
            const homeList = document.getElementById('home-tasks-list');
            homeList.innerHTML = "";
            const activeTasks = data.tasks.filter(tk => !tk.completed);
            if (activeTasks.length === 0) {
                homeList.innerHTML = `<li style="font-size:13px; color:var(--text-muted); justify-content:center;">${t.noTasks}</li>`;
            } else {
                activeTasks.slice(0, 4).forEach(tk => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:70%;">${tk.text}</span>`;
                    if(tk.time) {
                        const spanTime = document.createElement('span');
                        spanTime.className = "time-badge";
                        spanTime.innerText = tk.time;
                        li.appendChild(spanTime);
                    }
                    homeList.appendChild(li);
                });
            }

            // Render de vista de tareas detallada
            const tasksContainer = document.getElementById('tasks-container');
            tasksContainer.innerHTML = "";
            if (data.tasks.length === 0) {
                tasksContainer.innerHTML = `<p style="font-size:14px; color:var(--text-muted); text-align:center; padding:20px 0;">${t.noTasksBox}</p>`;
            } else {
                data.tasks.forEach((tk, index) => {
                    const row = document.createElement('div');
                    row.className = "task-row";
                    row.innerHTML = `
                        <div class="task-text ${tk.completed ? 'completed' : ''}" onclick="toggleTask(${index})">
                            <input type="checkbox" ${tk.completed ? 'checked' : ''}>
                            <span>${tk.text} ${tk.time ? `(${tk.time})` : ''}</span>
                        </div>
                        <button class="btn-delete" onclick="deleteTask(${index})">×</button>
                    `;
                    tasksContainer.appendChild(row);
                });
            }

            // Render de vista de notas con parseo estricto
            const notesContainer = document.getElementById('notes-container');
            notesContainer.innerHTML = "";
            if (data.notes.length === 0) {
                notesContainer.innerHTML = `<p style="font-size:14px; color:var(--text-muted); text-align:center; padding:10px 0;">${t.noNotes}</p>`;
            } else {
                data.notes.forEach((nt, index) => {
                    const btn = document.createElement('button');
                    btn.className = "card note-item-btn";
                    
                    // Contenedor interno estructurado con el renderizador del parser personalizado
                    btn.innerHTML = `
                        <div style="width:100%;">
                            <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                                <strong style="font-size:14px; color:var(--text-main);">${nt.title}</strong>
                            </div>
                            <div class="note-view-body" style="pointer-events:none; opacity:0.85;">
                                ${parseCustomSyntax(nt.body).substring(0, 160)}${nt.body && nt.body.length > 160 ? '...' : ''}
                            </div>
                        </div>
                    `;
                    btn.onclick = () => openNote(index);
                    notesContainer.appendChild(btn);
                });
            }

            if (activeView === "view-calendar") {
                renderCalendar();
            }
        }

        // Manejo de Color Picker en el Calendario
        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.onclick = (e) => {
                document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active'));
                e.target.classList.add('active');
                selectedColor = e.target.getAttribute('data-color');
            };
        });
        const activeColorOpt = document.querySelector(`.color-opt[data-color="${selectedColor}"]`);
        if(activeColorOpt) activeColorOpt.classList.add('active');

        // Lógica PWA / Instalación asistida
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.getElementById('btn-install-pwa');
            if(btn) btn.style.display = 'inline-flex';
        });

        const btnInst = document.getElementById('btn-install-pwa');
        if(btnInst) {
            btnInst.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            btnInst.style.display = 'none';
                        }
                        deferredPrompt = null;
                    });
                }
            });
        }

        // Loop Centralizado de Monitoreo de Alertas
        setInterval(() => {
            const ahora = new Date();
            const hrs = String(ahora.getHours()).padStart(2, '0');
            const mins = String(ahora.getMinutes()).padStart(2, '0');
            const horaActualStr = `${hrs}:${mins}`;

            data.tasks.forEach(t => {
                if(t.time && !t.completed) {
                    let taskTimeClean = t.time.trim();
                    if(taskTimeClean === horaActualStr && !tareasNotificadas.has(t.text + horaActualStr)) {
                        enviarNotificacion("Alerta de Actividad", `${t.text}`);
                        tareasNotificadas.add(t.text + horaActualStr);
                    }
                }
            });

            if(horaActualStr === "00:00") tareasNotificadas.clear();
        }, 30000);

        // Inicialización nativa de la App
        window.addEventListener('DOMContentLoaded', () => {
            let currentT = data.theme || 'light';
            if(currentT === 'system') {
                currentT = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', currentT);
            
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                if (data.theme === 'system') {
                    const updated = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', updated);
                }
            });

            renderEverything();
        });
    </script>
</body>
</html>
