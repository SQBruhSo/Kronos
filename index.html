<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calendario Interactivo</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calendar-container {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px; /* Tamaño ideal para PC y Mobile */
        }

        /* Selectores de Mes y Año superiores */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        .btn-nav {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-nav:hover {
            background-color: var(--primary-hover);
        }

        /* Grid del Calendario */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 10px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .day {
            aspect-ratio: 1; /* Hace que los días sean perfectamente cuadrados */
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .day:hover:not(.empty) {
            background-color: #e0e7ff;
            color: var(--primary-color);
        }

        .day.empty {
            cursor: default;
        }

        .day.today {
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        }

        .day.selected {
            background-color: #c7d2fe;
            color: var(--primary-color);
            font-weight: bold;
        }

        /* Ajustes adaptativos específicos para pantallas muy chicas */
        @media (max-width: 375px) {
            .calendar-container {
                padding: 16px;
            }
            select {
                font-size: 0.9rem;
                padding: 6px 8px;
            }
            .day {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="btn-nav" id="prevBtn">&lt;</button>
            <div class="controls">
                <select id="monthSelect"></select>
                <select id="yearSelect"></select>
            </div>
            <button class="btn-nav" id="nextBtn">&gt;</button>
        </div>

        <div class="weekdays">
            <div>Do</div>
            <div>Lu</div>
            <div>Ma</div>
            <div>Mi</div>
            <div>Ju</div>
            <div>Vi</div>
            <div>Sá</div>
        </div>

        <div class="days-grid" id="daysContainer"></div>
    </div>

    <script>
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const daysContainer = document.getElementById('daysContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        const months = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        // Fecha actual del sistema para inicializar
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();

        // Llenar selectores al cargar la página
        function initSelectors() {
            // Llenar meses
            months.forEach((month, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = month;
                monthSelect.appendChild(option);
            });

            // Llenar años (desde 1900 hasta el año 2100 de forma dinámica)
            for (let i = 1900; i <= 2100; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                yearSelect.appendChild(option);
            }

            updateSelectValues();
        }

        function updateSelectValues() {
            monthSelect.value = currentMonth;
            yearSelect.value = currentYear;
        }

        // Renderizar los días del calendario
        function renderCalendar() {
            daysContainer.innerHTML = "";

            // Primer día del mes seleccionado
            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            // Último día del mes seleccionado
            const lastDay = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Espacios en blanco para los días antes del primer día del mes
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.classList.add('day', 'empty');
                daysContainer.appendChild(emptyDiv);
            }

            // Crear los días numéricos del mes
            const today = new Date();
            for (let day = 1; day <= lastDay; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.classList.add('day');
                dayDiv.textContent = day;

                // Resaltar si es el día de hoy real
                if (day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
                    dayDiv.classList.add('today');
                }

                // Evento para seleccionar un día al hacer clic o tocar en el celular
                dayDiv.addEventListener('click', () => {
                    document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
                    dayDiv.classList.add('selected');
                });

                daysContainer.appendChild(dayDiv);
            }
        }

        // Escuchar cambios en los menús desplegables (Selects)
        monthSelect.addEventListener('change', (e) => {
            currentMonth = parseInt(e.target.value);
            renderCalendar();
        });

        yearSelect.addEventListener('change', (e) => {
            currentYear = parseInt(e.target.value);
            renderCalendar();
        });

        // Botones de navegación de flechas
        prevBtn.addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            updateSelectValues();
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            updateSelectValues();
            renderCalendar();
        });

        // Ejecución inicial al cargar
        initSelectors();
        renderCalendar();
    </script>
</body>
</html>
